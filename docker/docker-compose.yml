# =============================================================================
# Rentbot — Docker Compose (prod + staging)
# =============================================================================
#
# Two independent services:
#
#   prod     — stable release, sends alerts to your main Telegram chat
#   staging  — latest code, sends alerts to a separate test Telegram chat
#
# Each service has its OWN .env file (docker/env/prod.env, staging.env)
# and its OWN SQLite database volume, so they never interfere.
#
# Quick-start
# -----------
#   1. Copy the example env files and fill in credentials:
#        cp docker/env/prod.env.example    docker/env/prod.env
#        cp docker/env/staging.env.example docker/env/staging.env
#
#   2. In staging.env, set TELEGRAM_CHAT_ID to a DIFFERENT chat/group
#      than prod.env so alerts stay separate.
#
# Common commands (or use the Makefile targets — see below)
# ---------------------------------------------------------
#   Start production:
#     docker compose -f docker/docker-compose.yml up -d prod
#
#   Start staging (rebuilds image from current code):
#     docker compose -f docker/docker-compose.yml up -d --build staging
#
#   Seed run (no alerts, populate DB):
#     docker compose -f docker/docker-compose.yml run --rm staging --seed
#
#   Follow logs:
#     docker compose -f docker/docker-compose.yml logs -f staging
#
#   Stop one:
#     docker compose -f docker/docker-compose.yml stop staging
#
#   Stop all + wipe staging data:
#     docker compose -f docker/docker-compose.yml down -v --remove-orphans
#
# Makefile shortcuts (run from project root)
# ------------------------------------------
#   make prod-up          make staging-up
#   make prod-down        make staging-down
#   make prod-logs        make staging-logs
#   make prod-seed        make staging-seed
#   make promote          (copy staging.env → prod.env)
# =============================================================================

# Shared build config — both services use the same Dockerfile but can run
# different env files (and therefore different provider configs).
x-core-base: &core-base
  build:
    context: ..
    dockerfile: docker/Dockerfile.core
  environment:
    DATABASE_PATH: /data/rentbot.db
  restart: unless-stopped
  stop_grace_period: 30s

services:

  # ---------------------------------------------------------------------------
  # Production
  # ---------------------------------------------------------------------------
  prod:
    <<: *core-base
    image: rentbot-core:prod
    container_name: rentbot_prod
    env_file:
      - env/prod.env
    volumes:
      - rentbot_prod_data:/data

  # ---------------------------------------------------------------------------
  # Staging / Dev
  # ---------------------------------------------------------------------------
  staging:
    <<: *core-base
    image: rentbot-core:staging
    container_name: rentbot_staging
    env_file:
      - env/staging.env
    volumes:
      - rentbot_staging_data:/data

# =============================================================================
# Volumes — completely separate databases for prod and staging
# =============================================================================
volumes:
  rentbot_prod_data:
  rentbot_staging_data:
